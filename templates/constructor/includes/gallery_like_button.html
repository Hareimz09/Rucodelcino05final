<div data-gallery-like-container data-work-id="{{ work.id }}">
    <form method="post" action="{% url 'toggle_gallery_like' work.id %}" data-gallery-like-form>
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.get_full_path }}#gallery-work-{{ work.id }}">
        <button type="submit" class="inline-flex items-center gap-2 rounded-full border px-3 py-2 text-sm font-semibold transition {% if work.is_liked_by_current_user %}border-rose-200 bg-rose-50 text-rose-600 hover:bg-rose-100{% else %}border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:text-slate-900{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-5 w-5" {% if work.is_liked_by_current_user %}fill="currentColor"{% else %}fill="none"{% endif %} stroke="currentColor" stroke-width="1.9">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 20.8l-1.1-.98C5.14 14.7 2 11.86 2 8.39 2 5.55 4.24 3.3 7.08 3.3c1.6 0 3.13.74 4.12 1.9.99-1.16 2.52-1.9 4.12-1.9C18.16 3.3 20.4 5.55 20.4 8.39c0 3.47-3.14 6.31-8.9 11.43L12 20.8z"/>
            </svg>
            <span>{{ work.likes_count }}</span>
        </button>
    </form>
</div>
